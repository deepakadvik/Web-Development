<!DOCTYPE html>

      <!-- Checkbox -->

    <form action="/server">
    <div>
        <input type="checkbox" id="age" name="age">
        <label for="age">I am 18+</label>
        <button type="submit">Submit</button>
     </div>

      <!-- Radio Button -->
    <div>
        <input type="radio" name="Fruits" id="apple" value="Apple">
        <label for="apple">Apple</label>
        <input type="radio" name="Fruits" id="mango" value="Mango">
        <label for="mango">Mango</label>
        <input type="radio" name="Fruits" id="banana" value="Banana">
        <label for="banana">Banana</label>
        <button type="submit">Submit</button>
    </div>
     <!-- Group of Checkbox-->
    <div>
        <p>Choose Your Subjects:</p>
        <input type="checkbox" id="Math" name="Sub" value="Math">
        <label for="Math">Math</label>
        <input type="checkbox" id="Science" name="Sub" value="Sci">
        <label for="Science">Science</label>
        <input type="checkbox" id="English" name="Sub" value="Sci">
        <label for="English">English</label>
        <button type="submit">Submit</button>
    </div>
    <div>
        Choose Your Profession:
        <select name="Profession" id="Profession">
            <option>Select Your Option</option>
            <option value="Stu">Student</option>
            <option value="Dev" selected>Developer</option>
        </select>
        <button>Submit</button>
    </div>
      <label for="Vol">Select Volume Level:</label>
      <input type="range" id="Vol" min="0" max="100" name="Vol" step="10" value="70">
      <button type="submit">Submit</button>
      <br>
      <label for="Feedback">Please Give Your Valuable Feedback:</label>
      <textarea name="Feedback" id="Feedback" placeholder="Write Your Feedback Here!" rows="10n cols="70"></textarea>
      <button type="submit">Submit</button>
    </form>

</body>
</html>
